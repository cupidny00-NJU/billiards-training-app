<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b1512">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
  <meta name="apple-mobile-web-app-title" content="台球学习">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
  <title>台球学习与训练</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #06100d;
      --bg-2: #0c1714;
      --panel: #101b18;
      --panel-2: #17231f;
      --panel-3: #0b1411;
      --line: rgba(230, 255, 244, .11);
      --line-strong: rgba(230, 255, 244, .18);
      --text: #f1f8f4;
      --muted: #9dafaa;
      --muted-2: #6f817b;
      --green: #2dd17f;
      --green-2: #16a66c;
      --red: #f16b64;
      --red-2: #c94b44;
      --blue: #6eb8ff;
      --blue-2: #2f78c6;
      --gray: #73827c;
      --gray-2: #4c5b55;
      --yellow: #edbf54;
      --shadow: 0 18px 50px rgba(0, 0, 0, .34);
      --radius: 8px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      background:
        linear-gradient(180deg, rgba(17, 36, 31, .96), rgba(5, 10, 9, 1)),
        repeating-linear-gradient(135deg, rgba(255, 255, 255, .028) 0 1px, transparent 1px 9px);
      color: var(--text);
    }

    body {
      height: 100dvh;
      padding: max(8px, env(safe-area-inset-top)) 10px max(8px, env(safe-area-inset-bottom));
      line-height: 1.35;
      letter-spacing: 0;
      user-select: none;
      overflow: hidden;
    }

    button,
    select,
    input {
      font: inherit;
    }

    button {
      border: 0;
      color: var(--text);
      cursor: pointer;
      touch-action: manipulation;
      transition: transform .12s ease, filter .12s ease, opacity .12s ease;
    }

    button:active:not(:disabled) {
      transform: translateY(1px) scale(.99);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: .45;
    }

    .app {
      width: min(100%, 460px);
      height: 100%;
      margin: 0 auto;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto auto;
      gap: 8px;
      overflow: hidden;
    }

    .topbar {
      display: grid;
      gap: 7px;
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .brand-mark {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border-radius: 50%;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, .12), rgba(255, 255, 255, .02)),
        #0a1512;
      border: 1px solid var(--line-strong);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .14), 0 10px 24px rgba(0, 0, 0, .28);
      font-size: 19px;
    }

    .kicker {
      margin-bottom: 2px;
      color: var(--green);
      font-size: 10px;
      font-weight: 800;
    }

    h1 {
      margin: 0;
      font-size: 19px;
      line-height: 1.1;
      font-weight: 800;
    }

    .date {
      color: #dcebe4;
      font-size: 11px;
      white-space: nowrap;
      padding: 6px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, .055);
    }

    .project-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      align-items: center;
      gap: 10px;
      padding: 8px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .07), rgba(255, 255, 255, .035)),
        rgba(10, 22, 18, .9);
      box-shadow: 0 12px 32px rgba(0, 0, 0, .22);
    }

    .project-label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }

    .module-row {
      grid-template-columns: 1fr;
      gap: 7px;
    }

    .module-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      padding: 3px;
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: var(--radius);
      background: rgba(5, 12, 10, .46);
    }

    .module-tab {
      min-height: 34px;
      border-radius: calc(var(--radius) - 2px);
      color: var(--muted);
      background: transparent;
      font-size: 13px;
      font-weight: 850;
    }

    .module-tab.active {
      color: #062017;
      background: linear-gradient(180deg, #42e394, var(--green-2));
    }

    .picker-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      align-items: center;
      gap: 10px;
    }

    .select-wrap {
      position: relative;
    }

    select {
      width: 100%;
      height: 38px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      padding: 0 42px 0 12px;
      color: var(--text);
      background: #0d1815;
      outline: none;
      appearance: none;
      font-weight: 750;
    }

    .select-wrap::after {
      content: "⌄";
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-56%);
      color: var(--muted);
      pointer-events: none;
      font-size: 18px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .045), rgba(255, 255, 255, .015)),
        linear-gradient(180deg, var(--panel), var(--panel-2));
      box-shadow: var(--shadow);
    }

    .main-card {
      position: relative;
      overflow: hidden;
      padding: 10px;
      display: grid;
      grid-template-rows: auto auto minmax(150px, 1fr) auto;
      gap: 8px;
      min-height: 0;
    }

    .main-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 3px;
      background: linear-gradient(90deg, var(--green), var(--blue), var(--yellow));
    }

    .progress-head {
      display: grid;
      gap: 3px;
      position: relative;
      z-index: 1;
    }

    .project-name {
      color: var(--green);
      font-size: 12px;
      font-weight: 800;
    }

    .current-progress {
      font-size: 22px;
      font-weight: 850;
      line-height: 1.18;
    }

    .sub-progress {
      color: var(--muted);
      font-size: 12px;
    }

    .session-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      position: relative;
      z-index: 1;
    }

    .session-pill {
      min-width: 0;
      padding: 7px 6px;
      border: 1px solid rgba(255, 255, 255, .075);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .038);
    }

    .session-label {
      color: var(--muted-2);
      font-size: 10px;
      font-weight: 700;
    }

    .session-value {
      display: block;
      margin-top: 2px;
      color: var(--text);
      font-size: 13px;
      font-weight: 850;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .timer-box {
      position: relative;
      overflow: hidden;
      min-height: 150px;
      display: grid;
      place-items: center;
      border-radius: var(--radius);
      border: 1px solid rgba(255, 255, 255, .105);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .035), transparent),
        rgba(5, 12, 10, .62);
    }

    .timer-box::after {
      content: "";
      position: absolute;
      inset: 10px;
      border: 1px solid rgba(255, 255, 255, .045);
      border-radius: calc(var(--radius) - 1px);
      pointer-events: none;
    }

    .timer {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .timer-number {
      font-variant-numeric: tabular-nums;
      font-size: clamp(72px, 22vw, 88px);
      line-height: .9;
      font-weight: 900;
    }

    .timer-box.text-mode .timer-number {
      font-size: 34px;
      line-height: 1.05;
    }

    .timer-label {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    .timer-box.running .timer-number {
      color: var(--green);
    }

    .timer-box.done .timer-number {
      color: var(--yellow);
    }

    .bar-wrap {
      display: grid;
      gap: 6px;
    }

    .bar-meta {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 13px;
    }

    .bar {
      height: 12px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, .075);
      box-shadow: inset 0 1px 2px rgba(0, 0, 0, .28);
    }

    .bar-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--green), var(--blue), var(--yellow));
      transition: width .22s ease;
    }

    .actions {
      display: grid;
      gap: 7px;
    }

    .action-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .tool-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .btn {
      min-height: 46px;
      border-radius: var(--radius);
      padding: 9px 8px;
      font-weight: 800;
      font-size: 16px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .13), inset 0 -2px 0 rgba(0, 0, 0, .2), 0 10px 22px rgba(0, 0, 0, .16);
    }

    .btn-primary {
      min-height: 52px;
      background: linear-gradient(180deg, #42e394, var(--green-2));
      color: #062017;
      font-size: 18px;
    }

    .btn-success {
      background: linear-gradient(180deg, #31d68b, #1fa86b);
      color: #061e15;
    }

    .btn-fail {
      background: linear-gradient(180deg, var(--red), var(--red-2));
      color: #fff;
    }

    .btn-muted {
      background: linear-gradient(180deg, #7b8984, var(--gray-2));
      color: #f3fbf7;
      font-size: 12px;
      min-height: 38px;
      padding-left: 4px;
      padding-right: 4px;
    }

    .stats-card {
      padding: 8px;
      display: grid;
      gap: 6px;
    }

    .stats-card .section-title {
      display: none;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }

    .stat {
      min-height: 56px;
      padding: 7px 6px;
      border: 1px solid rgba(255, 255, 255, .075);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .055), rgba(255, 255, 255, .025));
    }

    .stat-label {
      color: var(--muted);
      font-size: 10px;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 850;
      font-variant-numeric: tabular-nums;
    }

    .stat-value.good {
      color: var(--green);
    }

    .stat-value.bad {
      color: var(--red);
    }

    .settings-card {
      padding: 0;
      display: grid;
      gap: 10px;
      box-shadow: none;
      border: 0;
      background: transparent;
    }

    .settings-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 14px;
    }

    .number-stepper {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .small-btn {
      width: 38px;
      height: 38px;
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .1);
      color: var(--text);
      font-size: 21px;
      font-weight: 800;
      border: 1px solid rgba(255, 255, 255, .08);
    }

    .round-value {
      min-width: 38px;
      text-align: center;
      color: var(--text);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .switch-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .switch {
      position: relative;
      width: 54px;
      height: 32px;
      flex: 0 0 auto;
    }

    .switch input {
      position: absolute;
      opacity: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, .14);
      transition: .18s ease;
    }

    .slider::before {
      content: "";
      position: absolute;
      width: 26px;
      height: 26px;
      left: 3px;
      top: 3px;
      border-radius: 50%;
      background: #fff;
      transition: .18s ease;
    }

    .switch input:checked + .slider {
      background: var(--green-2);
    }

    .switch input:checked + .slider::before {
      transform: translateX(22px);
    }

    .history-card {
      padding: 0;
      display: grid;
      gap: 10px;
      box-shadow: none;
      border: 0;
      background: transparent;
    }

    .section-title {
      font-size: 15px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .section-title::after {
      content: "";
      height: 1px;
      flex: 1;
      background: linear-gradient(90deg, rgba(255, 255, 255, .16), transparent);
    }

    .history-list {
      display: grid;
      gap: 8px;
      max-height: 34dvh;
      overflow: auto;
      padding-right: 2px;
    }

    .history-item {
      display: grid;
      gap: 3px;
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, .075);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .04);
      color: var(--muted);
      font-size: 13px;
    }

    .history-item strong {
      color: var(--text);
      font-size: 14px;
    }

    .history-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
    }

    .history-edit {
      min-height: 30px;
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 8px;
      padding: 5px 9px;
      color: #dcebe4;
      background: rgba(255, 255, 255, .07);
      font-size: 12px;
      font-weight: 800;
    }

    .empty {
      color: var(--muted);
      font-size: 13px;
      padding: 4px 0;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: none;
      place-items: end center;
      padding: 16px 14px max(16px, env(safe-area-inset-bottom));
      background: rgba(0, 0, 0, .58);
    }

    .modal-backdrop.show {
      display: grid;
    }

    .modal {
      width: min(100%, 430px);
      max-height: min(88dvh, 680px);
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #101a17;
      box-shadow: var(--shadow);
      padding: 16px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 13px;
      overflow: hidden;
    }

    .modal-scroll {
      min-height: 0;
      overflow: auto;
      display: grid;
      gap: 12px;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      touch-action: pan-y;
    }

    .modal h2 {
      margin: 0;
      font-size: 20px;
    }

    .summary-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .summary-item {
      padding: 10px;
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .045);
      color: var(--muted);
      font-size: 12px;
    }

    .summary-item b {
      display: block;
      margin-top: 4px;
      color: var(--text);
      font-size: 20px;
      font-variant-numeric: tabular-nums;
    }

    .advice {
      padding: 11px;
      border-left: 3px solid var(--green);
      border-radius: var(--radius);
      color: #d8e9e1;
      background: rgba(36, 194, 122, .1);
      font-size: 14px;
    }

    .danger-zone {
      display: grid;
      gap: 8px;
      padding-top: 2px;
    }

    .btn-outline {
      min-height: 46px;
      border: 1px solid rgba(239, 93, 93, .38);
      background: rgba(239, 93, 93, .08);
      color: #ffb2b2;
      border-radius: var(--radius);
      font-weight: 800;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .modal-actions.three {
      grid-template-columns: 1fr 1fr 1fr;
    }

    .history-summary {
      display: grid;
      gap: 8px;
      max-height: 26dvh;
      overflow: auto;
    }

    .note-context {
      color: var(--muted);
      font-size: 13px;
    }

    .text-field {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      padding: 0 11px;
      color: var(--text);
      background: rgba(5, 12, 10, .66);
      outline: none;
      user-select: text;
    }

    .note-input {
      width: 100%;
      min-height: 118px;
      resize: vertical;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      padding: 11px;
      color: var(--text);
      background: rgba(5, 12, 10, .66);
      outline: none;
      line-height: 1.45;
      user-select: text;
    }

    .image-upload {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 9px;
    }

    .file-button {
      min-height: 40px;
      display: grid;
      place-items: center;
      border-radius: var(--radius);
      padding: 8px 10px;
      color: #062017;
      background: linear-gradient(180deg, #42e394, var(--green-2));
      font-size: 13px;
      font-weight: 850;
    }

    .file-input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .image-hint {
      color: var(--muted);
      font-size: 12px;
    }

    .image-preview,
    .history-images {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 7px;
    }

    .note-image-thumb {
      position: relative;
      overflow: hidden;
      aspect-ratio: 1;
      border: 1px solid rgba(255, 255, 255, .1);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .05);
    }

    .note-image-thumb img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .image-thumb-button {
      padding: 0;
      cursor: pointer;
      text-align: left;
      appearance: none;
      -webkit-appearance: none;
      font: inherit;
    }

    .image-thumb-button:focus-visible {
      outline: 2px solid rgba(36, 194, 122, .85);
      outline-offset: 2px;
    }

    .image-viewer-card {
      max-height: 92dvh;
    }

    .image-viewer {
      min-height: 0;
      max-height: 70dvh;
      overflow: auto;
      border-radius: var(--radius);
      background: rgba(0, 0, 0, .42);
      border: 1px solid rgba(255, 255, 255, .08);
    }

    .image-viewer img {
      width: 100%;
      height: auto;
      display: block;
    }

    .shape-panel {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 10px;
      align-items: stretch;
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .045);
    }

    .shape-cover {
      width: 92px;
      min-height: 122px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, .1);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .04);
    }

    .shape-cover img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .shape-placeholder {
      height: 100%;
      min-height: 122px;
      display: grid;
      place-items: center;
      padding: 8px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    .shape-detail {
      min-width: 0;
      display: grid;
      gap: 6px;
      align-content: start;
    }

    .shape-detail-head {
      display: flex;
      gap: 8px;
      justify-content: space-between;
      align-items: start;
    }

    .shape-detail h3 {
      margin: 0;
      color: var(--text);
      font-size: 16px;
      line-height: 1.25;
    }

    .shape-time {
      flex: 0 0 auto;
      padding: 4px 7px;
      border-radius: 999px;
      color: #062017;
      background: var(--green);
      font-size: 11px;
      font-weight: 900;
      white-space: nowrap;
    }

    .shape-detail p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .shape-mini-list {
      margin: 0;
      padding-left: 16px;
      color: #dcebe4;
      font-size: 12px;

      closeSummaryBtn: document.getElementById("closeSummaryBtn"),
      closeSettingsBtn: document.getElementById("closeSettingsBtn"),
      closeNoteBtn: document.getElementById("closeNoteBtn"),
      closeShapeLibraryBtn: document.getElementById("closeShapeLibraryBtn"),
      closeImageBtn: document.getElementById("closeImageBtn"),
      saveNoteBtn: document.getElementById("saveNoteBtn"),
      exportBtn: document.getElementById("exportBtn"),
      closeHistoryBtn: document.getElementById("closeHistoryBtn"),
      newLessonBtn: document.getElementById("newLessonBtn"),
      reviewLessonsBtn: document.getElementById("reviewLessonsBtn"),
      courseHistoryBtn: document.getElementById("courseHistoryBtn"),
      courseTrainingBtn: document.getElementById("courseTrainingBtn"),
      courseExportBtn: document.getElementById("courseExportBtn"),
      noteHistoryCard: document.getElementById("noteHistoryCard"),
      historySummaryCard: document.getElementById("historySummaryCard"),
      todayHistoryCard: document.getElementById("todayHistoryCard"),
      todayHistoryTitle: document.getElementById("todayHistoryTitle")
    };

    init();

    function init() {
      els.todayText.textContent = formatDate(new Date());
      Object.entries(trainingConfigs).forEach(([key, config]) => {
        const option = document.createElement("option");
        option.value = key;
        option.textContent = config.name;
        els.trainingSelect.appendChild(option);
      });

      els.trainingModuleBtn.addEventListener("click", () => switchModule("training"));
      els.courseModuleBtn.addEventListener("click", () => switchModule("course"));
      els.trainingSelect.addEventListener("change", () => {
        stopTimer();
        state.currentProject = els.trainingSelect.value;
        ensureProject(state.currentProject);
        saveState();
        render();
      });

      els.startBtn.addEventListener("click", startCurrentAttempt);
      els.successBtn.addEventListener("click", () => recordResult("success"));
      els.failBtn.addEventListener("click", () => recordResult("fail"));
      els.undoBtn.addEventListener("click", endCurrentTraining);
      els.shapeQuickBtn.addEventListener("click", openShapeLibrary);
      els.noteBtn.addEventListener("click", () => switchModule("course"));
      els.historyBtn.addEventListener("click", openHistory);
      els.resetBtn.addEventListener("click", resetCurrentTimer);
      els.newLessonBtn.addEventListener("click", openNote);
      els.reviewLessonsBtn.addEventListener("click", openCourseLibrary);
      els.courseHistoryBtn.addEventListener("click", openHistory);
      els.courseTrainingBtn.addEventListener("click", () => switchModule("training"));
      els.courseExportBtn.addEventListener("click", exportData);
      els.clearAllBtn.addEventListener("click", clearAllData);
      els.closeSummaryBtn.addEventListener("click", () => els.summaryModal.classList.remove("show"));
      els.closeSettingsBtn.addEventListener("click", () => els.settingsModal.classList.remove("show"));
      els.closeNoteBtn.addEventListener("click", () => els.noteModal.classList.remove("show"));
      els.closeShapeLibraryBtn.addEventListener("click", () => els.shapeLibraryModal.classList.remove("show"));
      els.closeImageBtn.addEventListener("click", () => els.imageModal.classList.remove("show"));
      els.saveNoteBtn.addEventListener("click", saveNote);
      els.noteImageInput.addEventListener("change", handleNoteImages);
      els.shapeImageBtn.addEventListener("click", openCurrentShapeImage);
      els.shapeLibraryBtn.addEventListener("click", openShapeLibrary);
      els.exportBtn.addEventListener("click", exportData);
      els.closeHistoryBtn.addEventListener("click", () => els.historyModal.classList.remove("show"));
      document.addEventListener("touchstart", unlockAudio, { once: true, passive: true });
      document.addEventListener("click", unlockAudio, { once: true });
      els.imageModal.addEventListener("click", (event) => {
        if (event.target === els.imageModal) els.imageModal.classList.remove("show");
      });
      els.shapeLibraryModal.addEventListener("click", (event) => {
        if (event.target === els.shapeLibraryModal) els.shapeLibraryModal.classList.remove("show");
      });
      els.wakeLockToggle.addEventListener("change", () => {
        state.preferences.keepAwake = els.wakeLockToggle.checked;
        saveState();
        if (!state.preferences.keepAwake) releaseWakeLock();
      });
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible" && getProject().status === "running") {
          requestWakeLock();
        }
      });

      render();
    }

    function createInitialState() {
      const projects = {};
      Object.keys(trainingConfigs).forEach((key) => {
        projects[key] = createProjectState(key);
      });

      return {
        currentModule: "training",
        currentProject: "posture",
        projects,
        todayRecords: {},
        history: [],
        courseNotes: [],
        preferences: {
          keepAwake: true
        }
      };
    }

    function createProjectState(key) {
      const config = trainingConfigs[key];
      return {
        currentGroup: 1,
        currentRep: 1,
        success: 0,
        fail: 0,
        completed: 0,
        skipped: 0,
        status: "idle",
        remainingSeconds: config.timerSeconds || 0,
        totalGroups: config.totalGroups,
        timerEnabled: config.timerSeconds > 0,
        selectedShapeIndex: 0,
        undoStack: [],
        finished: false
      };
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(storageKey);
        if (!raw) return createInitialState();
        const parsed = JSON.parse(raw);
        return normalizeState(parsed);
      } catch (error) {
        return createInitialState();
      }
    }

    function normalizeState(saved) {
      const base = createInitialState();
      const merged = {
        ...base,
        ...saved,
        projects: { ...base.projects, ...(saved.projects || {}) },
        todayRecords: saved.todayRecords || {},
        history: Array.isArray(saved.history) ? saved.history : [],
        courseNotes: Array.isArray(saved.courseNotes) ? saved.courseNotes : Array.isArray(saved.notes) ? saved.notes : [],
        preferences: { ...base.preferences, ...(saved.preferences || {}) }
      };

      Object.keys(trainingConfigs).forEach((key) => {
        const config = trainingConfigs[key];
        merged.projects[key] = {
          ...createProjectState(key),
          ...(saved.projects && saved.projects[key] ? saved.projects[key] : {})
        };
        if (!Number.isFinite(merged.projects[key].totalGroups)) {
          merged.projects[key].totalGroups = config.totalGroups;
        }
        if (!Array.isArray(merged.projects[key].undoStack)) {
          merged.projects[key].undoStack = [];
        }
        merged.projects[key].totalGroups = config.totalGroups;
        if (key === "ballShape") {
          const savedIndex = Number(merged.projects[key].selectedShapeIndex);
          const fallbackIndex = Number(merged.projects[key].currentGroup) - 1;
          merged.projects[key].selectedShapeIndex = clamp(Number.isFinite(savedIndex) ? savedIndex : fallbackIndex, 0, ballShapeItems.length - 1);
        }
        const idleSeconds = config.timerSeconds;
        if (merged.projects[key].status === "idle" && idleSeconds > 0 && merged.projects[key].remainingSeconds !== idleSeconds) {
          merged.projects[key].remainingSeconds = idleSeconds;
        }
      });

      if (!trainingConfigs[merged.currentProject]) {
        merged.currentProject = "posture";
      }
      if (!["training", "course"].includes(merged.currentModule)) {
        merged.currentModule = "training";
      }

      return merged;
    }

    function saveState() {
      try {
        localStorage.setItem(storageKey, JSON.stringify(state));
      } catch (error) {
        const now = Date.now();
        if (now - lastSaveErrorAt > 3000) {
          lastSaveErrorAt = now;
          alert("本机存储空间不足，当前改动可能没有保存。建议先导出数据，再清理较旧的课程图片。");
        }
      }
    }

    function ensureProject(key) {
      if (!state.projects[key]) {
        state.projects[key] = createProjectState(key);
      }
    }

    function getConfig() {
      return trainingConfigs[state.currentProject];
    }

    function getProject() {
      ensureProject(state.currentProject);
      return state.projects[state.currentProject];
    }

    function getTotal(project = getProject(), key = state.currentProject) {
      const config = trainingConfigs[key];
      return project.totalGroups * config.repsPerGroup;
    }

    function getTimerSeconds(key = state.currentProject) {
      const config = trainingConfigs[key];
      return config.timerSeconds;
    }

    function startCurrentAttempt() {
      const project = getProject();
      if (project.finished) return;

      const seconds = getTimerSeconds();
      if (seconds <= 0) {
        project.status = "ready";
        project.remainingSeconds = 0;
        saveState();
        render();
        return;
      }

      stopTimer();
      project.remainingSeconds = seconds;
      project.status = "running";
      saveState();
      render();
      requestWakeLock();

      timerId = window.setInterval(() => {
        const current = getProject();
        current.remainingSeconds = Math.max(0, current.remainingSeconds - 1);
        if (current.remainingSeconds <= 0) {
          current.status = "done";
          stopTimer();
          notifyTrainingEnd();
        }
        saveState();
        render();
      }, 1000);
    }

    function recordResult(type) {
      const project = getProject();
      if (project.finished) return;

      const before = snapshotProject(project);
      stopTimer();

      if (type === "success") project.success += 1;
      if (type === "fail") project.fail += 1;
      if (type === "skip") project.skipped += 1;

      project.completed += 1;
      project.undoStack.push({
        before,
        recordId: createRecordId(),
        type,
        at: new Date().toISOString()
      });

      addRecord(type, project);
      advancePosition(project);

      if (state.currentProject !== "ballShape" && project.completed >= getTotal(project)) {
        project.finished = true;
        project.status = "complete";
        project.remainingSeconds = 0;
        saveHistorySummary("自动完成");
        saveState();
        render();
        notifyTrainingEnd();
        showSummary("训练完成");
        return;
      }

      project.status = "idle";
      project.remainingSeconds = getTimerSeconds();
      saveState();
      render();
    }

    function snapshotProject(project) {
      return {
        currentGroup: project.currentGroup,
        currentRep: project.currentRep,
        success: project.success,
        fail: project.fail,
        completed: project.completed,
        skipped: project.skipped,
        status: project.status,
        remainingSeconds: project.remainingSeconds,
        finished: project.finished,
        totalGroups: project.totalGroups,
        timerEnabled: project.timerEnabled,
        selectedShapeIndex: project.selectedShapeIndex
      };
    }

    function restoreSnapshot(project, snapshot) {
      Object.assign(project, snapshot);
    }

    function addRecord(type, project) {
      if (!state.todayRecords[todayKey]) state.todayRecords[todayKey] = [];
      const config = getConfig();
      const stackTop = project.undoStack[project.undoStack.length - 1];
      state.todayRecords[todayKey].push({
        id: stackTop.recordId,
        projectKey: state.currentProject,
        projectName: config.name,
        type,
        label: getRecordLabel(type, config),
        group: state.currentProject === "ballShape" ? (project.selectedShapeIndex || 0) + 1 : project.currentGroup,
        rep: state.currentProject === "ballShape" ? project.completed : project.currentRep,
        shapeTitle: state.currentProject === "ballShape" ? getCurrentShape(project)?.title : "",
        time: new Date().toISOString()
      });
    }

    function getRecordLabel(type, config) {
      if (type === "success") return config.successLabel;
      if (type === "fail") return config.failLabel;
      return "跳过/取消";
    }

    function advancePosition(project) {
      if (state.currentProject === "ballShape") return;
      const config = getConfig();
      project.currentRep += 1;
      if (project.currentRep > config.repsPerGroup) {
        project.currentRep = 1;
        project.currentGroup += 1;
      }
    }

    function undoLast() {
      const project = getProject();
      const item = project.undoStack.pop();
      if (!item) return;

      stopTimer();
      removeRecord(item.recordId);
      restoreSnapshot(project, item.before);
      saveState();
      render();
    }

    function removeRecord(recordId) {
      const records = state.todayRecords[todayKey] || [];
      const index = records.findIndex((record) => record.id === recordId);
      if (index >= 0) records.splice(index, 1);
    }

    function resetCurrentProject() {
      const config = getConfig();
      if (!confirm(`确定重置「${config.name}」当前进度吗？今日历史记录会保留。`)) return;
      stopTimer();
      state.projects[state.currentProject] = createProjectState(state.currentProject);
      saveState();
      render();
    }

    function resetCurrentTimer() {
      const project = getProject();
      const seconds = getTimerSeconds();
      if (project.finished || seconds <= 0) return;
      startCurrentAttempt();
    }

    function endCurrentTraining() {
      const project = getProject();
      const hasActivity = project.completed > 0 || project.status !== "idle";
      if (project.finished || !hasActivity) return;

      stopTimer();
      project.status = "idle";
      project.remainingSeconds = getTimerSeconds();
      if (project.completed > 0) {
        saveHistorySummary("手动结束");
      }
      saveState();
      render();
      notifyTrainingEnd();
      if (project.completed > 0) {
        showSummary("本次训练结束");
      }
    }

    function clearAllData() {
      if (!confirm("确定清空全部课程与训练数据吗？此操作不可恢复。")) return;
      stopTimer();
      localStorage.removeItem(storageKey);
      state = createInitialState();
      saveState();
      render();
    }

    function saveHistorySummary(endType = "训练结束") {
      const project = getProject();
      const config = getConfig();
      const rate = calcRate(project);
      state.history.unshift({
        id: createRecordId(),
        date: todayKey,
        finishedAt: new Date().toISOString(),
        endType,
        projectKey: state.currentProject,
        projectName: config.name,
        shapeTitle: state.currentProject === "ballShape" ? getCurrentShape(project)?.title : "",
        total: project.completed,
        success: project.success,
        fail: project.fail,
        skipped: project.skipped,
        rate
      });
    }

    function showSummary(title = "训练完成") {
      const project = getProject();
      const config = getConfig();
      const rate = calcRate(project);
      els.summaryTitle.textContent = `${title} ｜ ${config.name}`;
      els.summaryList.innerHTML = [
        ["总次数", project.completed],
        [config.successStatLabel, project.success],
        [config.failStatLabel, project.fail],
        [config.rateLabel, `${rate}%`]
      ].map(([label, value]) => (
        `<div class="summary-item">${label}<b>${value}</b></div>`
      )).join("");
      els.summaryAdvice.textContent = `建议：${config.advice(rate)}`;
      els.summaryModal.classList.add("show");
    }

    function switchModule(module) {
      if (module === state.currentModule) return;
      stopTimer();
      state.currentModule = module;
      saveState();
      render();
    }

    function render() {
      renderModuleControls();
      if (state.currentModule === "course") {
        renderCourseModule();
      } else {
        renderTrainingModule();
      }
      renderSettings();
      renderTodayHistory();
      renderHistorySummary();
      renderNoteHistory();
    }

    function renderModuleControls() {
      const isCourse = state.currentModule === "course";
      els.trainingModuleBtn.classList.toggle("active", !isCourse);
      els.courseModuleBtn.classList.toggle("active", isCourse);
      els.trainingPicker.classList.toggle("hidden", isCourse);
      els.trainingActions.classList.toggle("hidden", isCourse);
      els.courseActions.classList.toggle("hidden", !isCourse);
    }

    function renderTrainingModule() {
      const config = getConfig();
      const project = getProject();
      const total = getTotal(project);
      const shape = getCurrentShape(project);
      const completed = shape ? project.completed : Math.min(project.completed, total);
      const percent = shape ? (((project.selectedShapeIndex || 0) + 1) / ballShapeItems.length) * 100 : total ? (completed / total) * 100 : 0;
      const rate = calcRate(project);

      els.trainingSelect.value = state.currentProject;
      els.projectName.textContent = config.name;
      els.currentProgress.textContent = shape
        ? `${shape.title.replace("：", " ｜ ")}`
        : `第 ${Math.min(project.currentGroup, project.totalGroups)} ${config.unitA} / ${project.totalGroups} ｜ 第 ${Math.min(project.currentRep, config.repsPerGroup)} ${config.unitB} / ${config.repsPerGroup}`;
      els.subProgress.textContent = shape
        ? `${shape.time} ｜ ${shape.target}`
        : `总完成 ${completed} / ${total}`;
      els.statusText.textContent = getStatusText(project);
      els.targetText.textContent = shape ? shape.time : `${project.totalGroups}${config.unitA} × ${config.repsPerGroup}${config.unitB}`;
      els.remainingText.textContent = shape ? `第 ${(project.selectedShapeIndex || 0) + 1}/10` : `${Math.max(0, total - completed)}${config.unitB}`;
      els.progressText.textContent = shape ? `已记录 ${project.completed} 次 ｜ 当前 ${(project.selectedShapeIndex || 0) + 1}/10` : `${completed}/${total}`;
      els.progressFill.style.width = `${Math.min(100, percent)}%`;

      renderTimer(project, config);
      renderShapePanel(project);
      renderButtons(project, config);
      renderStats(project, config, completed, total, rate);
    }

    function renderCourseModule() {
      const notes = Array.isArray(state.courseNotes) ? state.courseNotes : [];
      const todayNotes = notes.filter((note) => note.date === todayKey);
      const latest = notes[0];
      const imageCount = notes.reduce((sum, note) => sum + (Array.isArray(note.images) ? note.images.length : 0), 0);
      const progress = notes.length ? Math.min(100, notes.length * 10) : 0;

      els.projectName.textContent = "课程学习";
      els.currentProgress.textContent = latest ? "最近上传的课程图片" : "上传课程笔记图片";
      els.subProgress.textContent = latest ? `${formatNoteTime(latest.time)} ｜ ${Array.isArray(latest.images) ? latest.images.length : 0} 张图` : "只保存图片，查看时可点开大图";
      els.statusText.textContent = "图片库";
      els.targetText.textContent = "随时回看";
      els.remainingText.textContent = `${todayNotes.length} 今日`;
      els.progressText.textContent = `${todayNotes.length} 今日 / ${notes.length} 总`;
      els.progressFill.style.width = `${progress}%`;
      els.shapePanel.classList.add("hidden");

      els.timerBox.classList.remove("running", "done");
      els.timerBox.classList.add("text-mode");
      els.timerNumber.textContent = "课程";
      els.timerLabel.textContent = "笔记图片";

      els.statCompleted.textContent = todayNotes.length;
      els.statRateLabel.textContent = "累计课程";
      els.statRate.textContent = notes.length;
      els.statSuccessLabel.textContent = "课程图片";
      els.statSuccess.textContent = imageCount;
      els.statFailLabel.textContent = "最近";
      els.statFail.textContent = latest ? formatShortDate(latest.time) : "-";
      els.statFail.classList.remove("bad");
      els.statFail.classList.add("good");
    }

    function getCurrentShape(project = getProject()) {
      if (state.currentProject !== "ballShape") return null;
      const index = clamp(Number(project.selectedShapeIndex) || 0, 0, ballShapeItems.length - 1);
      return ballShapeItems[index] || null;
    }

    function renderShapePanel(project) {
      const shape = getCurrentShape(project);
      if (!shape) {
        els.shapePanel.classList.add("hidden");
        return;
      }

      els.shapePanel.classList.remove("hidden");
      els.shapeTitle.textContent = shape.title;
      els.shapeTime.textContent = shape.time;
      els.shapeGoal.textContent = shape.target;
      els.shapeFocus.innerHTML = shape.focus.map((item) => `<li>${escapeHtml(item)}</li>`).join("");
      els.shapeImageBtn.innerHTML = shape.image
        ? `<img src="${shape.image}" alt="${escapeHtml(shape.title)}">`
        : `<div class="shape-placeholder">图片待补充</div>`;
    }

    function openCurrentShapeImage() {
      const shape = getCurrentShape();
      if (shape && shape.image) {
        openImageViewer(shape.image, shape.title);
      }
    }

    function openShapeLibrary() {
      ensureProject("ballShape");
      renderShapeLibrary();
      els.shapeLibraryModal.classList.add("show");
    }

    function renderShapeLibrary() {
      ensureProject("ballShape");
      const selectedIndex = clamp(Number(state.projects.ballShape.selectedShapeIndex) || 0, 0, ballShapeItems.length - 1);
      els.shapeLibrary.innerHTML = ballShapeItems.map((shape, index) => `
        <button class="shape-card-button ${index === selectedIndex ? "active" : ""}" type="button" data-shape-index="${index}">
          ${shape.image
            ? `<img src="${shape.image}" alt="${escapeHtml(shape.title)}">`
            : `<div class="shape-card-placeholder">图片待补充</div>`}
          <span class="shape-card-body">
            <strong>${escapeHtml(shape.title)}</strong>
            <span>${escapeHtml(shape.time)} ｜ ${escapeHtml(shape.target)}</span>
          </span>
        </button>
      `).join("");

      els.shapeLibrary.querySelectorAll("[data-shape-index]").forEach((button) => {
        button.addEventListener("click", () => {
          selectBallShape(Number(button.dataset.shapeIndex));
        });
      });
    }

    function selectBallShape(index) {
      if (!Number.isFinite(index) || !ballShapeItems[index]) return;
      stopTimer();
      state.currentModule = "training";
      state.currentProject = "ballShape";
      ensureProject("ballShape");
      const project = state.projects.ballShape;
      project.selectedShapeIndex = index;
      project.currentGroup = index + 1;
      project.currentRep = 1;
      project.status = "idle";
      project.finished = false;
      project.remainingSeconds = getTimerSeconds("ballShape");
      els.shapeLibraryModal.classList.remove("show");
      saveState();
      render();
    }

    function renderTimer(project, config) {
      const seconds = getTimerSeconds();
      els.timerBox.classList.toggle("running", project.status === "running");
      els.timerBox.classList.toggle("done", project.status === "done" || project.status === "complete");
      els.timerBox.classList.toggle("text-mode", project.finished || seconds <= 0);

      if (project.finished) {
        els.timerNumber.textContent = "完成";
        els.timerLabel.textContent = "本项目训练已完成";
        return;
      }

      if (seconds <= 0) {
        els.timerNumber.textContent = config.waitingText;
        els.timerLabel.textContent = project.status === "ready" ? "已准备，记录结果后自动进入下一项" : "记录结果后自动进入下一项";
        return;
      }

      els.timerNumber.textContent = formatTimerDisplay(project.remainingSeconds ?? seconds);
      if (project.status === "running") {
        els.timerLabel.textContent = "计时中";
      } else if (project.status === "done") {
        els.timerLabel.textContent = config.doneText;
      } else {
        els.timerLabel.textContent = seconds >= 60 ? `${Math.round(seconds / 60)} 分钟倒计时` : `${seconds} 秒倒计时`;
      }
    }

    function renderButtons(project, config) {
      const hasTimer = getTimerSeconds() > 0;
      const canRecord = !project.finished && project.status !== "running" && (!hasTimer || project.status === "done" || project.status === "ready");
      const hasActivity = project.completed > 0 || project.status !== "idle";
      els.startBtn.disabled = project.finished || project.status === "running";
      els.startBtn.textContent = project.status === "running" ? "计时中" : project.status === "done" ? "重新计时" : hasTimer ? "开始本次" : "进入待记录";
      els.successBtn.textContent = config.successLabel;
      els.failBtn.textContent = config.failLabel;
      els.successBtn.disabled = !canRecord;
      els.failBtn.disabled = !canRecord;
      els.undoBtn.textContent = "结束训练";
      els.undoBtn.disabled = project.finished || !hasActivity;
      els.resetBtn.textContent = "重置时间";
      els.resetBtn.disabled = project.finished || !hasTimer;
    }

    function getStatusText(project) {
      if (project.finished) return "已完成";
      if (project.status === "running") return "计时中";
      if (project.status === "done") return "待记录";
      if (project.status === "ready") return "可记录";
      return getTimerSeconds() > 0 ? "未开始" : "待记录";
    }

    function renderStats(project, config, completed, total, rate) {
      els.statCompleted.textContent = completed;
      els.statRateLabel.textContent = config.rateLabel;
      els.statRate.textContent = `${rate}%`;
      els.statSuccessLabel.textContent = config.successStatLabel;
      els.statSuccess.textContent = project.success;
      els.statFailLabel.textContent = config.failStatLabel;
      els.statFail.textContent = project.fail;
      els.statFail.classList.add("bad");
      els.statFail.classList.remove("good");
    }

    function renderSettings() {
      els.wakeLockToggle.checked = Boolean(state.preferences.keepAwake);
      const current = getConfig();
      els.settingsInfo.textContent = state.currentModule === "course"
        ? "课程学习只保存课程笔记图片，查看时可以直接点开大图。"
        : `当前项目：${current.name}。入位训练每次 30 秒；入门球形训练每个球形 10 分钟。`;
    }

    function openSettings() {
      renderSettings();
      els.settingsModal.classList.add("show");
    }

    function openHistory() {
      renderTodayHistory();
      renderHistorySummary();
      renderNoteHistory();
      els.historyTitle.textContent = "学习与训练记录";
      els.noteHistoryCard.classList.remove("hidden");
      els.historySummaryCard.classList.remove("hidden");
      els.todayHistoryCard.classList.remove("hidden");
      els.historyModal.classList.add("show");
    }

    function openCourseLibrary() {
      renderNoteHistory();
      els.historyTitle.textContent = "课程图片";
      els.noteHistoryCard.classList.remove("hidden");
      els.historySummaryCard.classList.add("hidden");
      els.todayHistoryCard.classList.add("hidden");
      els.historyModal.classList.add("show");
    }

    function openNote(category = "课程图片") {
      els.noteContext.textContent = `${formatDate(new Date())} ｜ ${category}`;
      els.noteImageInput.value = "";
      pendingNoteImages = [];
      renderNoteImagePreview();
      els.noteModal.dataset.category = category;
      els.noteModal.classList.add("show");
    }

    function saveNote() {
      const category = els.noteModal.dataset.category || "课程图片";
      if (!pendingNoteImages.length) return;

      state.courseNotes.unshift({
        id: createRecordId(),
        date: todayKey,
        time: new Date().toISOString(),
        category,
        title: `${formatShortDate(new Date().toISOString())} 课程图片`,
        text: "",
        images: pendingNoteImages,
        linkedTrainingProject: state.currentProject
      });
      saveState();
      render();
      renderNoteHistory();
      els.noteModal.classList.remove("show");
    }

    async function handleNoteImages(event) {
      const files = Array.from(event.target.files || []);
      const slots = Math.max(0, 12 - pendingNoteImages.length);
      const selected = files.slice(0, slots);
      for (const file of selected) {
        if (!file.type.startsWith("image/")) continue;
        try {
          const image = await compressImage(file);
          pendingNoteImages.push(image);
        } catch (error) {
          alert("有一张图片处理失败，请换一张再试。");
        }
      }
      event.target.value = "";
      renderNoteImagePreview();
    }

    function renderNoteImagePreview() {
      if (!pendingNoteImages.length) {
        els.noteImagePreview.innerHTML = "";
        return;
      }

      els.noteImagePreview.innerHTML = pendingNoteImages.map((image, index) => `
        <div class="note-image-thumb image-thumb-button" data-preview-index="${index}" role="button" tabindex="0">
          <img src="${image.dataUrl}" alt="笔记图片 ${index + 1}">
          <button class="remove-image" data-index="${index}" aria-label="删除图片">×</button>
        </div>
      `).join("");

      els.noteImagePreview.querySelectorAll("[data-preview-index]").forEach((thumb) => {
        thumb.addEventListener("click", () => {
          const image = pendingNoteImages[Number(thumb.dataset.previewIndex)];
          if (image) openImageViewer(image.dataUrl, image.name || "课程图片");
        });
        thumb.addEventListener("keydown", (event) => {
          if (event.key !== "Enter" && event.key !== " ") return;
          event.preventDefault();
          thumb.click();
        });
      });

      els.noteImagePreview.querySelectorAll(".remove-image").forEach((button) => {
        button.addEventListener("click", (event) => {
          event.stopPropagation();
          pendingNoteImages.splice(Number(button.dataset.index), 1);
          renderNoteImagePreview();
        });
      });
    }

    function compressImage(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onerror = reject;
        reader.onload = () => {
          const image = new Image();
          image.onerror = reject;
          image.onload = () => {
            const maxSide = 1200;
            const scale = Math.min(1, maxSide / Math.max(image.width, image.height));
            const width = Math.max(1, Math.round(image.width * scale));
            const height = Math.max(1, Math.round(image.height * scale));
            const canvas = document.createElement("canvas");
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(image, 0, 0, width, height);
            const dataUrl = canvas.toDataURL("image/jpeg", 0.74);
            resolve({
              name: file.name,
              type: "image/jpeg",
              width,
              height,
              dataUrl
            });
          };
          image.src = reader.result;
        };
        reader.readAsDataURL(file);
      });
    }

    function renderTodayHistory(dateKey = todayKey) {
      const records = (state.todayRecords[dateKey] || []).slice().reverse();
      els.todayHistoryTitle.textContent = dateKey === todayKey ? "今日明细" : `${dateKey} 明细`;
      if (!records.length) {
        els.todayHistory.innerHTML = `<div class="empty">${dateKey === todayKey ? "今天" : dateKey}还没有记录。</div>`;
        return;
      }

      els.todayHistory.innerHTML = records.map((record) => {
        const config = trainingConfigs[record.projectKey] || { unitA: "组", unitB: "次" };
        const time = new Date(record.time).toLocaleTimeString("zh-CN", {
          hour: "2-digit",
          minute: "2-digit"
        });
        return `
          <div class="history-item">
            <strong>${record.projectName}：${record.label}</strong>
            <span>${time} ｜ ${record.shapeTitle ? `${escapeHtml(record.shapeTitle)} ｜ ` : ""}第 ${record.group} ${config.unitA} ｜ 第 ${record.rep} ${config.unitB}</span>
            ${record.editedAt ? `<span>已编辑：${escapeHtml(formatNoteTime(record.editedAt))}</span>` : ""}
            <div class="history-tools">
              <button class="history-edit" type="button" data-edit-record="${escapeHtml(record.id)}" data-edit-date="${escapeHtml(dateKey)}">编辑</button>
            </div>
          </div>
        `;
      }).join("");

      els.todayHistory.querySelectorAll("[data-edit-record]").forEach((button) => {
        button.addEventListener("click", () => editTrainingRecord(button.dataset.editDate, button.dataset.editRecord));
      });
    }

    function editTrainingRecord(dateKey, recordId) {
      const records = state.todayRecords[dateKey] || [];
      const record = records.find((item) => item.id === recordId);
      if (!record) return;

      const config = trainingConfigs[record.projectKey] || {
        name: record.projectName || "训练记录",
        successLabel: "达标",
        failLabel: "未达标"
      };
      const currentChoice = record.type === "fail" ? "2" : "1";
      const input = prompt(
        `修改「${record.projectName}」结果：\n1 = ${config.successLabel}\n2 = ${config.failLabel}`,
        currentChoice
      );
      if (input === null) return;

      const value = input.trim();
      let nextType = "";
      if (value === "1" || value === config.successLabel || value === "成功" || value === "稳定" || value === "达标") {
        nextType = "success";
      }
      if (value === "2" || value === config.failLabel || value === "失败" || value === "不稳" || value === "未达标") {
        nextType = "fail";
      }
      if (!nextType) {
        alert("只能输入 1 或 2。");
        return;
      }
      if (nextType === record.type) return;

      const oldType = record.type;
      record.type = nextType;
      record.label = getRecordLabel(nextType, config);
      record.editedAt = new Date().toISOString();

      const project = state.projects[record.projectKey];
      const stackItem = project?.undoStack?.find((item) => item.recordId === recordId);
      if (stackItem) {
        adjustProjectCount(project, oldType, -1);
        adjustProjectCount(project, nextType, 1);
        stackItem.type = nextType;
      }

      saveState();
      render();
      renderTodayHistory(dateKey);
      renderHistorySummary();
    }

    function adjustProjectCount(project, type, amount) {
      if (type === "success") project.success = Math.max(0, project.success + amount);
      if (type === "fail") project.fail = Math.max(0, project.fail + amount);
      if (type === "skip") project.skipped = Math.max(0, project.skipped + amount);
    }

    function renderHistorySummary() {
      const summaries = Array.isArray(state.history) ? state.history : [];
      const dailyRecords = Object.entries(state.todayRecords || {})
        .sort(([a], [b]) => b.localeCompare(a));

      if (!summaries.length && !dailyRecords.length) {
        els.historySummary.innerHTML = `<div class="empty">还没有历史训练记录。</div>`;
        return;
      }

      const summaryHtml = summaries.map((item) => {
        const finished = item.finishedAt ? new Date(item.finishedAt).toLocaleTimeString("zh-CN", {
          hour: "2-digit",
          minute: "2-digit"
        }) : "";
        const shapeText = item.shapeTitle ? ` ｜ ${escapeHtml(item.shapeTitle)}` : "";
        return `
          <div class="history-item">
            <strong>${item.date} ${item.projectName}</strong>
            <span>${finished} ｜ ${escapeHtml(item.endType || "训练结束")}${shapeText} ｜ 总 ${item.total} ｜ 达标 ${item.success} ｜ 未达标 ${item.fail} ｜ ${item.rate}%</span>
          </div>
        `;
      }).join("");

      const dailyHtml = dailyRecords.map(([date, records]) => {
        const success = records.filter((record) => record.type === "success").length;
        const fail = records.filter((record) => record.type === "fail").length;
        return `
          <div class="history-item">
            <strong>${date} 每日记录</strong>
            <span>总 ${records.length} ｜ 达标 ${success} ｜ 未达标 ${fail}</span>
            <div class="history-tools">
              <button class="history-edit" type="button" data-open-date="${escapeHtml(date)}">查看/编辑</button>
            </div>
          </div>
        `;
      }).join("");

      els.historySummary.innerHTML = `${summaryHtml}${dailyHtml}`;
      els.historySummary.querySelectorAll("[data-open-date]").forEach((button) => {
        button.addEventListener("click", () => renderTodayHistory(button.dataset.openDate));
      });
    }

    function renderNoteHistory() {
      const notes = Array.isArray(state.courseNotes) ? state.courseNotes : [];
      const images = [];
      notes.forEach((note, noteIndex) => {
        (Array.isArray(note.images) ? note.images : []).forEach((image, imageIndex) => {
          images.push({ note, noteIndex, image, imageIndex });
        });
      });

      if (!images.length) {
        els.noteHistory.innerHTML = `<div class="empty">还没有课程图片。</div>`;
        return;
      }

      els.noteHistory.innerHTML = `
        <div class="history-images">
          ${images.map((item, index) => `
            <button class="note-image-thumb image-thumb-button" data-image-flat-index="${index}" type="button" aria-label="打开课程图片 ${index + 1}">
              <img src="${item.image.dataUrl}" alt="课程图片 ${index + 1}">
            </button>
          `).join("")}
        </div>
      `;

      els.noteHistory.querySelectorAll("[data-image-flat-index]").forEach((button) => {
        button.addEventListener("click", () => {
          const item = images[Number(button.dataset.imageFlatIndex)];
          if (item && item.image) openImageViewer(item.image.dataUrl, item.image.name || "课程图片");
        });
      });
    }

    function openImageViewer(src, title = "课程图片") {
      els.imageViewerTitle.textContent = title;
      els.imageViewerImg.src = src;
      els.imageModal.classList.add("show");
    }

    function exportData() {
      const payload = {
        exportedAt: new Date().toISOString(),
        app: "台球学习与训练",
        version: 4,
        state
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `台球学习与训练-${todayKey}.json`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function getPositionText(project, config) {
      return `第 ${Math.min(project.currentGroup, project.totalGroups)} ${config.unitA} / ${project.totalGroups} ｜ 第 ${Math.min(project.currentRep, config.repsPerGroup)} ${config.unitB} / ${config.repsPerGroup}`;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    async function requestWakeLock() {
      if (!state.preferences.keepAwake || !("wakeLock" in navigator)) return;
      try {
        wakeLock = await navigator.wakeLock.request("screen");
        wakeLock.addEventListener("release", () => {
          wakeLock = null;
        });
      } catch (error) {
        wakeLock = null;
      }
    }

    function releaseWakeLock() {
      if (wakeLock) {
        wakeLock.release().catch(() => {});
        wakeLock = null;
      }
    }

    function calcRate(project) {
      const counted = project.success + project.fail;
      if (!counted) return 0;
      return Math.round((project.success / counted) * 100);
    }

    function vibrate() {
      if ("vibrate" in navigator) {
        navigator.vibrate([200, 100, 200]);
      }
    }

    function unlockAudio() {
      try {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) return;
        if (!audioContext || audioContext.state === "closed") {
          audioContext = new AudioContextClass();
        }
        if (audioContext.state === "suspended") {
          audioContext.resume().catch(() => {});
        }
      } catch (error) {
        audioContext = null;
      }
    }

    function notifyTrainingEnd() {
      vibrate();
      playFinishSound();
    }

    function playFinishSound() {
      unlockAudio();
      if (!audioContext) return;

      const play = () => {
        try {
          const now = audioContext.currentTime;
          const gain = audioContext.createGain();
          gain.gain.setValueAtTime(0.0001, now);
          gain.gain.exponentialRampToValueAtTime(0.2, now + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.34);
          gain.connect(audioContext.destination);

          [880, 1175].forEach((frequency, index) => {
            const oscillator = audioContext.createOscillator();
            oscillator.type = "sine";
            oscillator.frequency.setValueAtTime(frequency, now + index * 0.15);
            oscillator.connect(gain);
            oscillator.start(now + index * 0.15);
            oscillator.stop(now + index * 0.15 + 0.16);
          });
        } catch (error) {
          audioContext = null;
        }
      };

      if (audioContext.state === "suspended") {
        audioContext.resume().then(play).catch(() => {});
        return;
      }
      play();
    }

    function stopTimer() {
      if (timerId) {
        clearInterval(timerId);
        timerId = null;
      }
      releaseWakeLock();
    }

    function getDateKey(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function formatDate(date) {
      return date.toLocaleDateString("zh-CN", {
        month: "long",
        day: "numeric",
        weekday: "short"
      });
    }

    function formatNoteTime(value) {
      return new Date(value).toLocaleString("zh-CN", {
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function formatShortDate(value) {
      return new Date(value).toLocaleDateString("zh-CN", {
        month: "2-digit",
        day: "2-digit"
      });
    }

    function formatTimerDisplay(seconds) {
      const value = Math.max(0, Number(seconds) || 0);
      if (value < 60) return String(value);
      const minutes = Math.floor(value / 60);
      const rest = String(value % 60).padStart(2, "0");
      return `${minutes}:${rest}`;
    }

    function createRecordId() {
      return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    if ("serviceWorker" in navigator && location.protocol !== "file:") {
      window.addEventListener("load", () => {
        const isLocalDebug = ["127.0.0.1", "localhost", "::1"].includes(location.hostname);
        if (isLocalDebug) {
          navigator.serviceWorker.getRegistrations()
            .then((registrations) => Promise.all(registrations.map((registration) => registration.unregister())))
            .then(() => caches.keys())
            .then((keys) => Promise.all(keys.map((key) => caches.delete(key))))
            .catch(() => {});
          return;
        }

        navigator.serviceWorker.register("./sw.js").catch(() => {});
      });
    }
  </script>
